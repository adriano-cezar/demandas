*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#ffffff;--bg2:#f5f5f3;--bg3:#eeede9;
  --text:#1a1a18;--text2:#6b6b66;--text3:#9b9b96;
  --border:#e0dfd9;--border2:#c8c7c0;
  --blue-bg:#e8f0fb;--blue:#1a5cbf;
  --amber-bg:#fef3dc;--amber:#8a5200;
  --red-bg:#fdecea;--red:#b03030;
  --green-bg:#e8f5e9;--green:#2e7d32;
  --gray-bg:#f0efe9;--gray:#5a5a55;
  --radius:10px;--radius-lg:14px;
}
@media(prefers-color-scheme:dark){:root{
  --bg:#1c1c1a;--bg2:#252523;--bg3:#2e2e2b;
  --text:#f0efe8;--text2:#a0a09a;--text3:#6a6a65;
  --border:#3a3a36;--border2:#4a4a45;
  --blue-bg:#0f2a50;--blue:#7aabf5;
  --amber-bg:#3a2800;--amber:#f5c060;
  --red-bg:#3a1010;--red:#f08080;
  --green-bg:#0e2e10;--green:#80cc80;
  --gray-bg:#2a2a28;--gray:#a0a09a;
}}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;font-size:15px;line-height:1.5}
.app{display:flex;flex-direction:column;min-height:100vh;max-width:680px;margin:0 auto;padding:0 0 80px}

.header{position:sticky;top:0;z-index:50;background:var(--bg);border-bottom:1px solid var(--border);padding:12px 16px;display:flex;align-items:center;justify-content:space-between;gap:8px}
.header h1{font-size:17px;font-weight:600;display:flex;align-items:center;gap:7px}
.header h1 svg{width:20px;height:20px;flex-shrink:0}
.btn{display:inline-flex;align-items:center;gap:5px;font-size:13px;font-weight:500;padding:7px 13px;border-radius:var(--radius);border:1px solid var(--border2);background:var(--bg);color:var(--text);cursor:pointer;white-space:nowrap;transition:background 0.15s}
.btn:hover{background:var(--bg2)}
.btn:active{transform:scale(0.97)}
.btn-primary{background:var(--text);color:var(--bg);border-color:transparent}
.btn-primary:hover{opacity:0.87;background:var(--text)}

.sync-status{font-size:11px;color:var(--text3);display:flex;align-items:center;gap:4px}
.sync-dot{width:7px;height:7px;border-radius:50%;background:var(--green)}
.sync-dot.syncing{background:var(--amber);animation:pulse 1s infinite}
.sync-dot.error{background:var(--red)}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.4}}

.metrics{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;padding:14px 16px}
.metric{background:var(--bg2);border-radius:var(--radius);padding:10px 12px}
.metric-label{font-size:11px;color:var(--text2);margin-bottom:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.metric-value{font-size:22px;font-weight:600;line-height:1}
.v-total{color:var(--text)}.v-open{color:var(--blue)}.v-alta{color:var(--red)}.v-venc{color:var(--red)}

.filters{padding:0 16px 10px;display:flex;flex-direction:column;gap:8px}
.search-row{position:relative}
.search-row svg{position:absolute;left:10px;top:50%;transform:translateY(-50%);width:16px;height:16px;color:var(--text3);pointer-events:none}
#search{width:100%;padding:8px 10px 8px 34px;border:1px solid var(--border);border-radius:var(--radius);background:var(--bg);color:var(--text);font-size:14px}
#search:focus{outline:none;border-color:var(--blue)}
.filter-row{display:flex;gap:6px;overflow-x:auto;padding-bottom:2px;scrollbar-width:none}
.filter-row::-webkit-scrollbar{display:none}
.filter-row select{flex-shrink:0;font-size:13px;padding:6px 8px;border:1px solid var(--border);border-radius:var(--radius);background:var(--bg);color:var(--text);cursor:pointer}

.list{padding:0 16px;display:flex;flex-direction:column;gap:8px}
.empty-state{text-align:center;padding:3rem 1rem;color:var(--text2)}
.empty-state svg{width:40px;height:40px;margin:0 auto 12px;display:block;opacity:0.4}
.empty-state p{font-size:14px}

.card{background:var(--bg);border:1px solid var(--border);border-radius:var(--radius-lg);padding:12px 14px;cursor:pointer;transition:border-color 0.15s}
.card:hover{border-color:var(--border2)}
.card-top{display:flex;align-items:flex-start;justify-content:space-between;gap:8px}
.card-title{font-size:14px;font-weight:500;flex:1;line-height:1.4}
.card-actions{display:flex;gap:2px;flex-shrink:0}
.icon-btn{background:transparent;border:none;cursor:pointer;padding:5px;border-radius:7px;color:var(--text2);display:flex;align-items:center;justify-content:center}
.icon-btn:hover{background:var(--bg2);color:var(--text)}
.icon-btn svg{width:16px;height:16px}
.card-badges{display:flex;flex-wrap:wrap;gap:5px;margin-top:7px}
.badge{display:inline-flex;align-items:center;gap:3px;font-size:11px;font-weight:500;padding:2px 7px;border-radius:6px}
.b-pendente{background:var(--blue-bg);color:var(--blue)}
.b-andamento{background:var(--amber-bg);color:var(--amber)}
.b-concluido{background:var(--green-bg);color:var(--green)}
.b-cancelado{background:var(--gray-bg);color:var(--gray)}
.b-alta{background:var(--red-bg);color:var(--red)}
.b-media{background:var(--amber-bg);color:var(--amber)}
.b-baixa{background:var(--green-bg);color:var(--green)}
.card-meta{display:flex;flex-wrap:wrap;gap:8px;margin-top:6px;font-size:12px;color:var(--text2)}
.meta-item{display:flex;align-items:center;gap:3px}
.meta-item svg{width:12px;height:12px;flex-shrink:0}
.card-obs{margin-top:6px;font-size:12px;color:var(--text2);font-style:italic;line-height:1.4}
.vencida-tag{color:var(--red);font-weight:500}

.fab{display:none;position:fixed;bottom:20px;right:20px;z-index:60;width:52px;height:52px;border-radius:50%;background:var(--text);color:var(--bg);border:none;cursor:pointer;align-items:center;justify-content:center;box-shadow:0 3px 10px rgba(0,0,0,0.25)}
.fab svg{width:24px;height:24px}
@media(max-width:500px){
  .fab{display:flex}
  .header .btn-primary{display:none}
  .metrics{grid-template-columns:repeat(2,1fr)}
}

.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.45);z-index:100;align-items:flex-end;justify-content:center}
.overlay.open{display:flex}
@media(min-width:501px){.overlay{align-items:center}}
.modal{background:var(--bg);width:100%;max-width:480px;border-radius:var(--radius-lg) var(--radius-lg) 0 0;padding:20px 16px 32px;max-height:92vh;overflow-y:auto}
@media(min-width:501px){.modal{border-radius:var(--radius-lg);padding:24px}}
.modal-handle{width:36px;height:4px;border-radius:2px;background:var(--border2);margin:0 auto 16px}
@media(min-width:501px){.modal-handle{display:none}}
.modal-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.modal-header h2{font-size:16px;font-weight:600}
.field{margin-bottom:13px}
.field label{display:block;font-size:12px;font-weight:500;color:var(--text2);margin-bottom:4px;text-transform:uppercase;letter-spacing:0.03em}
.field input,.field select,.field textarea{width:100%;font-size:14px;padding:9px 11px;border:1px solid var(--border);border-radius:var(--radius);background:var(--bg);color:var(--text)}
.field input:focus,.field select:focus,.field textarea:focus{outline:none;border-color:var(--blue)}
.field textarea{resize:vertical;min-height:72px;line-height:1.5}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.modal-footer{display:flex;gap:8px;justify-content:flex-end;margin-top:16px;padding-top:14px;border-top:1px solid var(--border)}
.btn-danger{color:var(--red);border-color:var(--red-bg)}
.btn-danger:hover{background:var(--red-bg)}

.toast{position:fixed;bottom:28px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--text);color:var(--bg);font-size:13px;padding:8px 16px;border-radius:var(--radius);opacity:0;transition:all 0.25s;z-index:200;white-space:nowrap;pointer-events:none}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

.loading{text-align:center;padding:2rem;color:var(--text2);font-size:14px}
</style>
</head>
<body>
<div class="app">
  <header class="header">
    <h1>
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2"/><rect x="9" y="3" width="6" height="4" rx="1"/><path d="M9 12h6M9 16h4"/></svg>
      Demandas
    </h1>
    <div style="display:flex;align-items:center;gap:10px">
      <div class="sync-status"><div class="sync-dot" id="syncDot"></div><span id="syncLabel">Conectado</span></div>
      <button class="btn btn-primary" onclick="openModal()">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        Nova demanda
      </button>
    </div>
  </header>

  <div class="metrics" id="metrics"></div>

  <div class="filters">
    <div class="search-row">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      <input type="search" id="search" placeholder="Buscar título, responsável, demandado…" oninput="renderList()">
    </div>
    <div class="filter-row">
      <select id="fStatus" onchange="renderList()">
        <option value="">Todos os status</option>
        <option value="pendente">Pendente</option>
        <option value="andamento">Em andamento</option>
        <option value="concluido">Concluído</option>
        <option value="cancelado">Cancelado</option>
      </select>
      <select id="fPrio" onchange="renderList()">
        <option value="">Todas as prioridades</option>
        <option value="alta">Alta</option>
        <option value="media">Média</option>

      <select id="fSort" onchange="renderList()">
        <option value="prio">↑ Prioridade</option>
        <option value="prazo">↑ Prazo</option>
        <option value="criacao">↑ Criação</option>
        <option value="status">↑ Status</option>

  <div class="list" id="list"><div class="loading">Carregando…</div></div>
</div>

<button class="fab" onclick="openModal()" aria-label="Nova demanda">
  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
</button>

<div class="overlay" id="overlay" onclick="overlayClick(event)">

        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>

    <div class="field"><label>Título / descrição *</label><input id="fTitulo" type="text" placeholder="Descreva a demanda…"></div>
    <div class="row2">
      <div class="field"><label>Status</label>
        <select id="fStatus2">
          <option value="pendente">Pendente</option>

          <option value="concluido">Concluído</option>
          <option value="cancelado">Cancelado</option>

        <select id="fPrio2">

          <option value="media">Média</option>

<div class="toast" id="toast"></div>

<script>
// ─── CONFIGURAÇÃO ────────────────────────────────────────────────
// Cole aqui as suas chaves do Supabase (passo 1 do guia)
const SUPABASE_URL = 'COLE_AQUI_A_URL_DO_SUPABASE';
const SUPABASE_KEY = 'COLE_AQUI_A_ANON_KEY_DO_SUPABASE';
// ────────────────────────────────────────────────────────────────

const { createClient } = supabase;
const db = createClient(SUPABASE_URL, SUPABASE_KEY);
const TABLE = 'demandas';

let demands = [];
let editId = null;

const PRIO_O = {alta:0,media:1,baixa:2};
const ST_O   = {pendente:0,andamento:1,concluido:2,cancelado:3};
const ST_LBL = {pendente:'Pendente',andamento:'Em andamento',concluido:'Concluído',cancelado:'Cancelado'};
const PR_LBL = {alta:'Alta',media:'Média',baixa:'Baixa'};

function esc(s){return(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}
function fmtDate(s){if(!s)return'';const[y,m,d]=s.split('-');return`${d}/${m}/${y}`}
function toast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2200)}
function setSyncStatus(state){
  const dot=document.getElementById('syncDot');
  const lbl=document.getElementById('syncLabel');
  dot.className='sync-dot'+(state==='syncing'?' syncing':state==='error'?' error':'');
  lbl.textContent=state==='syncing'?'Salvando…':state==='error'?'Sem conexão':'Sincronizado';
}

async function loadData(){
  setSyncStatus('syncing');
  const {data,error}=await db.from(TABLE).select('*').order('created_at',{ascending:false});
  if(error){setSyncStatus('error');document.getElementById('list').innerHTML='<div class="empty-state"><p>Erro ao carregar. Verifique sua conexão.</p></div>';return;}
  demands=data||[];
  setSyncStatus('ok');
  renderMetrics();renderList();
}

function renderMetrics(){
  const today=new Date().toISOString().slice(0,10);
  const tot=demands.length;
  const open=demands.filter(d=>d.status!=='concluido'&&d.status!=='cancelado').length;
  const alta=demands.filter(d=>d.prioridade==='alta'&&d.status!=='concluido'&&d.status!=='cancelado').length;
  const venc=demands.filter(d=>d.prazo&&d.prazo<today&&d.status!=='concluido'&&d.status!=='cancelado').length;
  document.getElementById('metrics').innerHTML=`
    <div class="metric"><div class="metric-label">Total</div><div class="metric-value v-total">${tot}</div></div>
    <div class="metric"><div class="metric-label">Em aberto</div><div class="metric-value v-open">${open}</div></div>
    <div class="metric"><div class="metric-label">Prior. alta</div><div class="metric-value v-alta">${alta}</div></div>
    <div class="metric"><div class="metric-label">Vencidas</div><div class="metric-value v-venc">${venc}</div></div>`;
}

function renderList(){
  const q=(document.getElementById('search').value||'').toLowerCase();
  const fs=document.getElementById('fStatus').value;
  const fp=document.getElementById('fPrio').value;
  const srt=document.getElementById('fSort').value;
  const today=new Date().toISOString().slice(0,10);

  let list=demands.filter(d=>{
    if(fs&&d.status!==fs)return false;
    if(fp&&d.prioridade!==fp)return false;
    if(q&&![d.titulo,d.responsavel,d.demandado,d.obs].some(x=>(x||'').toLowerCase().includes(q)))return false;
    return true;
  });

  list.sort((a,b)=>{
    if(srt==='prio')return(PRIO_O[a.prioridade]-PRIO_O[b.prioridade])||ST_O[a.status]-ST_O[b.status];
    if(srt==='prazo')return(a.prazo||'9999')>(b.prazo||'9999')?1:-1;
    if(srt==='criacao')return(b.criacao||'')>(a.criacao||'')?1:-1;
    if(srt==='status')return ST_O[a.status]-ST_O[b.status];
    return 0;
  });

  const el=document.getElementById('list');
  if(!list.length){
    el.innerHTML=`<div class="empty-state">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2"/><rect x="9" y="3" width="6" height="4" rx="1"/></svg>
      <p>${demands.length===0?'Nenhuma demanda ainda.<br>Toque em <strong>+ Nova demanda</strong> para começar.':'Nenhuma demanda encontrada.'}</p>
    </div>`;return;
  }

  el.innerHTML=list.map(d=>{
    const venc=d.prazo&&d.prazo<today&&d.status!=='concluido'&&d.status!=='cancelado';
    const prazoHtml=d.prazo?(venc
      ?`<span class="meta-item vencida-tag"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>Venceu ${fmtDate(d.prazo)}</span>`
      :`<span class="meta-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>${fmtDate(d.prazo)}</span>`):'';
    const respHtml=d.responsavel?`<span class="meta-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/></svg>${esc(d.responsavel)}</span>`:'';
    const demHtml=d.demandado?`<span class="meta-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/><polyline points="16,11 18,13 22,9"/></svg>${esc(d.demandado)}</span>`:'';
    return `<div class="card" onclick="openModal('${d.id}')">
      <div class="card-top">
        <div class="card-title">${esc(d.titulo)}</div>
        <div class="card-actions" onclick="event.stopPropagation()">
          <button class="icon-btn" onclick="openModal('${d.id}')">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
          </button>
        </div>
      </div>
      <div class="card-badges">
        <span class="badge b-${d.status}">${ST_LBL[d.status]}</span>
        <span class="badge b-${d.prioridade}">${PR_LBL[d.prioridade]}</span>
      </div>
      ${(respHtml||demHtml||prazoHtml)?`<div class="card-meta">${respHtml}${demHtml}${prazoHtml}</div>`:''}
      ${d.obs?`<div class="card-obs">${esc(d.obs)}</div>`:''}
    </div>`;
  }).join('');
}

function openModal(id){
  editId=id||null;
  document.getElementById('modalTitle').textContent=id?'Editar demanda':'Nova demanda';
  document.getElementById('btnDelete').style.display=id?'':'none';
  const today=new Date().toISOString().slice(0,10);
  if(id){
    const d=demands.find(x=>x.id===id);
    document.getElementById('fTitulo').value=d.titulo||'';
    document.getElementById('fStatus2').value=d.status||'pendente';
    document.getElementById('fPrio2').value=d.prioridade||'media';
    document.getElementById('fResp').value=d.responsavel||'';
    document.getElementById('fDemandado').value=d.demandado||'';
    document.getElementById('fCriacao').value=d.criacao||today;
    document.getElementById('fPrazo').value=d.prazo||'';
    document.getElementById('fObs').value=d.obs||'';
  } else {
    document.getElementById('fTitulo').value='';
    document.getElementById('fStatus2').value='pendente';
    document.getElementById('fPrio2').value='media';
    document.getElementById('fResp').value='';
    document.getElementById('fDemandado').value='';
    document.getElementById('fCriacao').value=today;
    document.getElementById('fPrazo').value='';
    document.getElementById('fObs').value='';
  }
  document.getElementById('overlay').classList.add('open');
  setTimeout(()=>document.getElementById('fTitulo').focus(),100);
}

function closeModal(){document.getElementById('overlay').classList.remove('open')}
function overlayClick(e){if(e.target===document.getElementById('overlay'))closeModal()}

async function saveDemand(){
  const titulo=document.getElementById('fTitulo').value.trim();
  if(!titulo){alert('Informe o título da demanda.');return;}
  const payload={
    titulo,
    status:document.getElementById('fStatus2').value,
    prioridade:document.getElementById('fPrio2').value,
    responsavel:document.getElementById('fResp').value.trim()||null,
    demandado:document.getElementById('fDemandado').value.trim()||null,
    criacao:document.getElementById('fCriacao').value||null,
    prazo:document.getElementById('fPrazo').value||null,
    obs:document.getElementById('fObs').value.trim()||null,
  };
  setSyncStatus('syncing');
  let error;
  if(editId){
    ({error}=await db.from(TABLE).update(payload).eq('id',editId));
  } else {
    ({error}=await db.from(TABLE).insert(payload));
  }
  if(error){setSyncStatus('error');toast('Erro ao salvar. Tente novamente.');return;}
  toast(editId?'Demanda atualizada':'Demanda criada');
  closeModal();
  await loadData();
}

async function deleteCurrent(){
  if(!editId)return;
  if(!confirm('Excluir esta demanda?'))return;
  setSyncStatus('syncing');
  const{error}=await db.from(TABLE).delete().eq('id',editId);
  if(error){setSyncStatus('error');toast('Erro ao excluir.');return;}
  toast('Demanda excluída');
  closeModal();
  await loadData();
}

document.addEventListener('keydown',e=>{if(e.key==='Escape')closeModal()});
loadData();
</script>
</body>
